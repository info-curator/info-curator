<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Samsung News & Market Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1428A0; /* Samsung Blue */
            --secondary: #000000;
            --bg: #f8f9fc;
            --card-bg: #ffffff;
            --text: #2d3436;
            --accent: #E5F0FF;
            --safe: #2ecc71;
            --toxic: #e74c3c;
            --neutral: #f39c12;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 4px solid var(--primary);
            margin-bottom: 40px;
            background: white;
            border-radius: 0 0 20px 20px;
        }
        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.5em;
            font-weight: 800;
        }
        p.subtitle {
            color: #636e72;
            font-size: 1.1em;
            margin-top: 10px;
        }
        
        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }
        .stats-card.full-width {
            grid-column: 1 / -1;
            height: 400px;
        }
        .stats-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            height: 350px;
            display: flex;
            flex-direction: column;
        }
        .stats-card h2 {
            margin-top: 0;
            font-size: 1.25em;
            color: var(--primary);
            text-align: center;
            margin-bottom: 15px;
        }
        .chart-container {
            flex-grow: 1;
            position: relative;
        }
        
        /* News Grid */
        .section-title {
            margin-top: 40px;
            margin-bottom: 25px;
            padding-left: 10px;
            border-left: 5px solid var(--primary);
            color: var(--primary);
            font-size: 1.5em;
            font-weight: 800;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            border-bottom: 3px solid transparent;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .source-tag {
            background: var(--accent);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 700;
        }
        .safety-badge {
            font-size: 0.8em;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 8px;
        }
        .safety-badge.safe { background: #dff9fb; color: var(--safe); }
        .safety-badge.neutral { background: #ffeaa7; color: var(--neutral); }
        .safety-badge.toxic { background: #fab1a0; color: var(--toxic); }
        
        .title {
            font-size: 1.15em;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text);
            line-height: 1.4;
        }
        
        .summary {
            font-size: 0.9em;
            color: #636e72;
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        
        .monitor-pane {
            background: #f1f2f6;
            border-radius: 8px;
            padding: 12px;
            margin-top: auto;
            font-size: 0.85em;
        }
        .monitor-header {
            font-weight: 800;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }
        
        .link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            font-size: 0.9em;
            margin-top: 15px;
            text-align: right;
            display: block;
            transition: color 0.2s;
        }
        .link:hover {
            color: #000;
        }

        @media (max-width: 900px) {
            .stats-section { grid-template-columns: 1fr; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Samsung News & Market Monitor</h1>
            <p class="subtitle">삼성전자 핵심 사업부 및 경쟁사 실시간 동향 (업데이트: 2026-04-10 11:01)</p>
        </header>

        <h2 class="section-title">📊 핵심 지표 시각화 (Overview)</h2>
        <div class="stats-section">
            <div class="stats-card">
                <h2>카테고리별 보도 비중 (Volume)</h2>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="stats-card">
                <h2>오늘의 핫 토픽 Top 10 (Keywords)</h2>
                <div class="chart-container">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>
            <div class="stats-card full-width">
                <h2>이번 주 vs 지난 주 비교 (Time-Series)</h2>
                <div class="chart-container">
                    <canvas id="timeSeriesChart"></canvas>
                </div>
            </div>
        </div>
        
        <div id="news-container"></div>

    <!-- External scripts for dynamic rendering -->
    <script src="dashboard_data.js"></script>
    <script src="dashboard_script.js"></script>
</body>
</html>
